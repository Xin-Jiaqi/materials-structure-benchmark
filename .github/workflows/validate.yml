name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  catalog:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install -e '.[test]'
      - run: python -m unittest discover -s tests -v
      - run: python scripts/query_catalog.py --type monolayer --limit 3
      - run: python scripts/query_catalog.py --type bulk --limit 3
      - name: Build and check distributions
        if: matrix.python-version == '3.14'
        run: |
          python -m build
          python -m twine check dist/*
      - name: Install and query the built wheel outside the repository
        if: matrix.python-version == '3.14'
        run: |
          python -m pip install --no-deps --force-reinstall dist/*.whl
          cd /tmp
          materials-catalog-query --type monolayer --limit 1
          materials-catalog-query --type bulk --limit 1 --json
